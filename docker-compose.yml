
services:
  app:
    image: node:latest
    container_name: signpack
    working_dir: /app
    ports:
      - "8090:8090"  # change this if needed
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./:/app
      - ./logs:/app/logs
    restart: unless-stopped
    command: /bin/sh -c "npm install && node ."
